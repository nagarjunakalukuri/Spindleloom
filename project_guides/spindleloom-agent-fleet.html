// ─── LAYOUT ──────────────────────────────────────────────────────────────────
const SVG_W   = 2060;
const L_MAR   = 148;
const R_MAR   = 20;
const LANE_H  = 122;
const NODE_W  = 134;
const NODE_H  = 44;
const HDR_H   = 34;

const phaseIdx = {};
PHASES.forEach((p,i)=>phaseIdx[p.id]=i);

const phaseAgents={};
PHASES.forEach(p=>{phaseAgents[p.id]=[]});
AGENTS.forEach(a=>phaseAgents[a.phase].push(a));

const pos={}; // id→{cx,cy}
PHASES.forEach((ph,pi)=>{
  const list=phaseAgents[ph.id];
  const lY=HDR_H+pi*LANE_H;
  const usable=SVG_W-L_MAR-R_MAR;
  list.forEach((a,ai)=>{
    pos[a.id]={cx: L_MAR+(usable/list.length)*(ai+0.5), cy: lY+LANE_H/2};
  });
});
const SVG_H=HDR_H+PHASES.length*LANE_H+22;

// ─── BUILD SVG ───────────────────────────────────────────────────────────────
const svg=document.getElementById('graph');
const ns='http://www.w3.org/2000/svg';
svg.setAttribute('width',SVG_W);
svg.setAttribute('height',SVG_H);
svg.setAttribute('viewBox',`0 0 ${SVG_W} ${SVG_H}`);

function el(tag,attrs,text){
  const e=document.createElementNS(ns,tag);
  for(const [k,v] of Object.entries(attrs)) e.setAttribute(k,v);
  if(text!=null) e.textContent=text;
  return e;
}

// Defs
const defs=el('defs',{});
const gp=el('pattern',{id:'grid',width:'40',height:'40',patternUnits:'userSpaceOnUse'});
gp.appendChild(el('path',{d:'M 40 0 L 0 0 0 40',fill:'none',stroke:'#0E2238','stroke-width':'0.35'}));
defs.appendChild(gp);
function mkArr(id,color){
  const m=el('marker',{id,markerWidth:'7',markerHeight:'7',refX:'5.5',refY:'3',orient:'auto'});
  m.appendChild(el('path',{d:'M0,0 L7,3 L0,6 Z',fill:color}));
  return m;
}
defs.appendChild(mkArr('arr-p','#C8982A'));
defs.appendChild(mkArr('arr-s','#3D8FB5'));
defs.appendChild(mkArr('arr-f','#8055B5'));
svg.appendChild(defs);

// Background
svg.appendChild(el('rect',{width:SVG_W,height:SVG_H,fill:'#060F1C'}));
svg.appendChild(el('rect',{width:SVG_W,height:SVG_H,fill:'url(#grid)'}));

// Phase lanes
PHASES.forEach((ph,pi)=>{
  const ly=HDR_H+pi*LANE_H;
  svg.appendChild(el('rect',{x:0,y:ly,width:SVG_W,height:LANE_H,fill:ph.color,opacity:'0.055'}));
  svg.appendChild(el('rect',{x:0,y:ly,width:L_MAR-8,height:LANE_H,fill:ph.color,opacity:'0.14'}));
  if(pi>0) svg.appendChild(el('line',{x1:0,y1:ly,x2:SVG_W,y2:ly,stroke:ph.color,'stroke-width':'0.5',opacity:'0.28'}));
  svg.appendChild(el('text',{x:9,y:ly+17,fill:ph.color,opacity:'0.6','font-family':'Courier New,monospace','font-size':'9','letter-spacing':'0.14em'},ph.n));
  svg.appendChild(el('text',{x:9,y:ly+30,fill:ph.color,'font-family':'Courier New,monospace','font-size':'8','letter-spacing':'0.09em'},ph.label));
});

// ─── EDGES ───────────────────────────────────────────────────────────────────
const edgeLayer=el('g',{});
svg.appendChild(edgeLayer);

const ECFG={
  p:{stroke:'#C8982A',sw:1.5, op:0.55,dash:'none', arr:'arr-p'},
  s:{stroke:'#3D8FB5',sw:0.85,op:0.26,dash:'5,4',  arr:'arr-s'},
  f:{stroke:'#8055B5',sw:0.85,op:0.38,dash:'2,5',  arr:'arr-f'},
  i:{stroke:'#4A8AAA',sw:0.7, op:0,   dash:'3,6',  arr:'arr-s'}, // indexes — hidden until wiki-curator selected
};
const edgeEls={};

EDGES.forEach(edge=>{
  const a=pos[edge.from], b=pos[edge.to];
  if(!a||!b) return;
  const key=edge.from+'→'+edge.to;
  const pA=phaseIdx[AGENTS.find(x=>x.id===edge.from)?.phase]??-1;
  const pB=phaseIdx[AGENTS.find(x=>x.id===edge.to)?.phase]??-1;
  const cfg=ECFG[edge.t];
  let d;
  if(pA===pB){
    const mx=(a.cx+b.cx)/2;
    d=`M${a.cx},${a.cy-NODE_H/2} Q${mx},${a.cy-NODE_H/2-48} ${b.cx},${b.cy-NODE_H/2}`;
  } else if(pB<pA){
    const ox=Math.max(a.cx,b.cx)+90;
    d=`M${a.cx},${a.cy} C${ox},${a.cy} ${ox},${b.cy} ${b.cx+NODE_W/2},${b.cy}`;
  } else {
    const mY=(a.cy+b.cy)/2;
    d=`M${a.cx},${a.cy+NODE_H/2} C${a.cx},${mY} ${b.cx},${mY} ${b.cx},${b.cy-NODE_H/2}`;
  }
  const path=el('path',{d,fill:'none',stroke:cfg.stroke,'stroke-width':cfg.sw,
    opacity:cfg.op,'stroke-dasharray':cfg.dash,'marker-end':`url(#${cfg.arr})`});
  edgeLayer.appendChild(path);
  edgeEls[key]={el:path,from:edge.from,to:edge.to,t:edge.t,cfg};
});

// ─── NODES ───────────────────────────────────────────────────────────────────
const nodeLayer=el('g',{});
svg.appendChild(nodeLayer);
const nodeEls={};

AGENTS.forEach(agent=>{
  const p=pos[agent.id]; if(!p) return;
  const ph=PHASES.find(x=>x.id===agent.phase);
  const c=ph.color;
  const g=document.createElementNS(ns,'g');
  g.setAttribute('data-id',agent.id);
  g.style.cursor='pointer';
  g.setAttribute('transform',`translate(${p.cx-NODE_W/2},${p.cy-NODE_H/2})`);

  const r=el('rect',{width:NODE_W,height:NODE_H,rx:'2',ry:'2',
    fill:c,'fill-opacity':'0.13',stroke:c,'stroke-width':'0.85','stroke-opacity':'0.65'});
  g.appendChild(r);
  g.appendChild(el('rect',{x:0,y:0,width:5,height:5,fill:c,opacity:'0.8'}));
  g.appendChild(el('rect',{x:NODE_W-5,y:NODE_H-5,width:5,height:5,fill:c,opacity:'0.45'}));

  const lines=agent.label.split('\n');
  const baseY=lines.length===1 ? NODE_H/2+4 : NODE_H/2-3;
  lines.forEach((ln,li)=>{
    g.appendChild(el('text',{x:NODE_W/2,y:baseY+li*13,fill:'#C4D8EE',
      'font-family':'Courier New,monospace','font-size':'9','text-anchor':'middle',
      'letter-spacing':'0.04em'},ln));
  });

  g.addEventListener('mouseenter',e=>showTip(e,agent,ph));
  g.addEventListener('mouseleave',()=>tip.classList.remove('show'));
  g.addEventListener('click',()=>selectAgent(agent.id));
  nodeLayer.appendChild(g);
  nodeEls[agent.id]=g;
});

// ─── INTERACTION ─────────────────────────────────────────────────────────────
const tip=document.getElementById('tooltip');
const infoBar=document.getElementById('info-bar');
let selected=null;

function showTip(e,agent,ph){
  document.getElementById('tip-id').textContent=agent.id;
  document.getElementById('tip-phase').textContent=ph.label;
  document.getElementById('tip-desc').textContent=agent.desc;
  tip.classList.add('show');
  moveTip(e);
}
document.addEventListener('mousemove',e=>{if(tip.classList.contains('show'))moveTip(e)});
function moveTip(e){
  tip.style.left=Math.min(e.clientX+18,window.innerWidth-280)+'px';
  tip.style.top=Math.min(e.clientY+14,window.innerHeight-140)+'px';
}

function selectAgent(id){
  if(selected===id){clearSel();return}
  selected=id;
  const linked=new Set([id]);
  const linkedEdges=new Set();
  Object.keys(edgeEls).forEach(k=>{
    const e=edgeEls[k];
    if(e.from===id||e.to===id){linked.add(e.from);linked.add(e.to);linkedEdges.add(k)}
  });
  Object.keys(nodeEls).forEach(nid=>{
    const g=nodeEls[nid];
    if(linked.has(nid)){
      g.style.opacity='1';
      g.querySelector('rect').setAttribute('fill-opacity',nid===id?'0.38':'0.22');
    } else {
      g.style.opacity='0.1';
    }
  });
  Object.keys(edgeEls).forEach(k=>{
    const e=edgeEls[k];
    if(linkedEdges.has(k)){
      const hiOp = e.t==='p'?'0.95': e.t==='f'?'0.8': e.t==='i'?'0.45':'0.55';
      e.el.setAttribute('opacity',hiOp);
      if(e.t==='p') e.el.setAttribute('stroke-width','2.2');
    } else {
      e.el.setAttribute('opacity','0.03');
    }
  });
  const agent=AGENTS.find(a=>a.id===id);
  const ph=PHASES.find(p=>p.id===agent.phase);
  const out=EDGES.filter(e=>e.from===id).length;
  const inc=EDGES.filter(e=>e.to===id).length;
  infoBar.innerHTML=`<span>${id}</span> &nbsp;·&nbsp; ${ph.label} &nbsp;·&nbsp; ${inc} incoming &nbsp;·&nbsp; ${out} outgoing &nbsp;·&nbsp; click again to clear`;
}

function clearSel(){
  selected=null;
  Object.keys(nodeEls).forEach(nid=>{
    nodeEls[nid].style.opacity='1';
    nodeEls[nid].querySelector('rect').setAttribute('fill-opacity','0.13');
  });
  Object.keys(edgeEls).forEach(k=>{
    const e=edgeEls[k];
    e.el.setAttribute('opacity',e.cfg.op);
    e.el.setAttribute('stroke-width',e.cfg.sw);
  });
  infoBar.innerHTML='Click any agent to trace its delegation chain &nbsp;·&nbsp; Hover for description';
}
svg.addEventListener('click',e=>{if(!e.target.closest('[data-id]'))clearSel()});

// ─── LEGEND ──────────────────────────────────────────────────────────────────
const pl=document.getElementById('phase-legend');
PHASES.forEach(ph=>{
  const r=document.createElement('div');
  r.className='lr';
  const d=document.createElement('div');
  d.className='lc';d.style.background=ph.color;
  r.appendChild(d);
  r.appendChild(document.createTextNode(ph.label));
  pl.appendChild(r);
});
</script>
