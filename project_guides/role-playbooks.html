<title>Spindleloom — Role Playbooks</title>
<style>
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

:root {
  --bg:      #0E1117;
  --surface: #141922;
  --sf2:     #1A2130;
  --bd:      #1D2535;
  --bd2:     #253040;
  --tx:      #C9D2DF;
  --tx2:     #7A8DA3;
  --tx3:     #46586E;
  --mono: ui-monospace,'Cascadia Code','Menlo','Consolas',monospace;
  --sans: system-ui,-apple-system,'Segoe UI',sans-serif;
}
html { font-size: 14px; }
body { background:var(--bg); color:var(--tx); font-family:var(--sans); line-height:1.5; min-height:100vh; }

/* header */
.hdr {
  position:sticky; top:0; z-index:100;
  background:color-mix(in srgb,var(--bg) 88%,transparent);
  -webkit-backdrop-filter:blur(14px); backdrop-filter:blur(14px); border-bottom:1px solid var(--bd);
  padding:0 24px;
}
.hdr-row {
  display:flex; align-items:center; justify-content:space-between;
  height:46px; gap:16px;
}
.site-name { font-family:var(--mono); font-size:12px; font-weight:600; color:var(--tx2); letter-spacing:.04em; white-space:nowrap; }
.site-name strong { color:var(--tx); }

.vtgl { display:flex; gap:2px; background:var(--surface); border:1px solid var(--bd); border-radius:6px; padding:2px; }
.vtgl-btn {
  font-size:12px; font-weight:500; color:var(--tx3); background:none; border:none;
  border-radius:4px; padding:4px 12px; cursor:pointer;
  transition:color .15s,background .15s; white-space:nowrap;
}
.vtgl-btn:hover { color:var(--tx2); }
.vtgl-btn.on { background:var(--sf2); color:var(--tx); }
.vtgl-btn:focus-visible { outline:2px solid #4F94F0; outline-offset:2px; }

/* role tabs */
.rtabs { display:flex; overflow-x:auto; scrollbar-width:none; }
.rtabs::-webkit-scrollbar { display:none; }
.rtab {
  display:flex; align-items:center; gap:6px;
  font-size:12.5px; font-weight:500; color:var(--tx3);
  background:none; border:none; border-bottom:2px solid transparent;
  padding:10px 14px; cursor:pointer;
  transition:color .15s,border-color .15s; white-space:nowrap;
}
.rtab:hover { color:var(--tx2); }
.rtab.on { color:var(--tx); border-bottom-color:var(--rc,#4F94F0); }
.rtab:focus-visible { outline:2px solid #4F94F0; outline-offset:-2px; }
.rdot { width:6px; height:6px; border-radius:50%; background:var(--rc,#4F94F0); flex-shrink:0; opacity:0; transition:opacity .15s; }
.rtab.on .rdot, .rtab:hover .rdot { opacity:1; }

/* layout */
main { max-width:1200px; margin:0 auto; padding:24px 24px 64px; }

/* cards */
.cgrid { display:grid; grid-template-columns:repeat(auto-fill,minmax(380px,1fr)); gap:12px; }
.card {
  background:var(--surface); border:1px solid var(--bd);
  border-left:3px solid var(--rc,#4F94F0); border-radius:6px;
  overflow:hidden; transition:border-color .15s,transform .15s;
}
.card:hover { border-color:var(--rc,#4F94F0); border-color:color-mix(in srgb,var(--rc,#4F94F0) 55%,var(--bd)); transform:translateY(-1px); }
.card[hidden] { display:none; }

.card-hd {
  display:flex; align-items:center; justify-content:space-between;
  padding:10px 14px 8px; border-bottom:1px solid var(--bd);
}
.card-label { font-size:12px; font-weight:600; color:var(--tx); }
.card-role { font-family:var(--mono); font-size:10px; font-weight:700; color:var(--rc,#4F94F0); letter-spacing:.08em; text-transform:uppercase; opacity:.8; }

.card-bd { padding:12px 14px; display:flex; flex-direction:column; gap:10px; }

/* prompt */
.prompt-wrap { display:flex; flex-direction:column; gap:6px; }
.prompt-box {
  background:var(--sf2); border:1px solid var(--bd2); border-radius:4px;
  padding:10px 12px; position:relative;
}
.prompt-box::before {
  content:'>';
  font-family:var(--mono); font-size:11px; color:var(--rc,#4F94F0);
  position:absolute; left:12px; top:10px; line-height:1.5;
}
.prompt-text { font-family:var(--mono); font-size:12px; color:var(--tx); line-height:1.65; padding-left:16px; }

/* ingredient badges */
.ing-row { display:flex; flex-wrap:wrap; gap:4px; }
.ing {
  font-size:10px; font-weight:600; letter-spacing:.03em;
  padding:2px 7px; border-radius:2px; border:1px solid;
}

/* chain rows */
.crow { display:flex; flex-direction:column; gap:4px; }
.clabel {
  font-size:10.5px; font-weight:700; color:var(--tx3);
  letter-spacing:.07em; text-transform:uppercase;
  display:flex; align-items:center; gap:6px;
}
.clabel::before { content:''; display:block; width:1px; height:11px; background:var(--bd2); margin-left:6px; }

.achip {
  display:inline-flex; align-items:center; gap:5px;
  font-family:var(--mono); font-size:11.5px; font-weight:500;
  color:var(--rc,#4F94F0);
  background:rgba(79,148,240,.11);
  background:color-mix(in srgb,var(--rc,#4F94F0) 11%,var(--sf2));
  border:1px solid rgba(79,148,240,.28);
  border:1px solid color-mix(in srgb,var(--rc,#4F94F0) 28%,var(--bd));
  border-radius:3px; padding:2px 8px;
}
.achip.mcp { color:#D4922A; background:rgba(212,146,42,.11); background:color-mix(in srgb,#D4922A 11%,var(--sf2)); border-color:rgba(212,146,42,.28); border-color:color-mix(in srgb,#D4922A 28%,var(--bd)); }

.apills { display:flex; flex-wrap:wrap; gap:5px; }
.apill { font-family:var(--mono); font-size:10.5px; color:var(--tx2); background:var(--sf2); border:1px solid var(--bd2); border-radius:3px; padding:2px 7px; }

.cclist { display:flex; flex-wrap:wrap; gap:5px; }
.ccchip { font-family:var(--mono); font-size:10.5px; color:var(--tx3); background:var(--sf2); border:1px solid var(--bd2); border-radius:3px; padding:2px 7px; transition:color .12s,border-color .12s; cursor:default; }
.ccchip:hover { color:var(--tx2); border-color:var(--bd); }

.ctip { font-size:11.5px; color:var(--tx3); border-left:2px solid var(--bd2); padding-left:8px; line-height:1.55; }

/* chain view */
#chain-view { overflow-x:auto; }
.pipeline { display:flex; align-items:flex-start; min-width:860px; padding:8px 0 16px; }
.pphase { flex:1; min-width:130px; }
.pphase-hd { font-size:10px; font-weight:700; color:var(--tx3); text-transform:uppercase; letter-spacing:.1em; padding:0 10px 10px; border-bottom:1px solid var(--bd); margin-bottom:14px; }
.pnodes { display:flex; flex-direction:column; gap:8px; padding:0 6px; }
.pnode-doc { background:var(--sf2); border:1px solid var(--bd2); border-radius:4px; padding:7px 10px; display:flex; flex-direction:column; gap:5px; }
.pnode-name { font-family:var(--mono); font-size:11px; font-weight:600; color:var(--tx); }
.pnode-agents { display:flex; flex-wrap:wrap; gap:3px; }
.ptag { font-family:var(--mono); font-size:9.5px; color:var(--rc,#4F94F0); background:rgba(79,148,240,.13); background:color-mix(in srgb,var(--rc,#4F94F0) 13%,var(--sf2)); border:1px solid rgba(79,148,240,.22); border:1px solid color-mix(in srgb,var(--rc,#4F94F0) 22%,var(--bd)); border-radius:2px; padding:1px 5px; }
.pcons { display:flex; flex-wrap:wrap; gap:3px; margin-top:2px; }
.pctag { font-family:var(--mono); font-size:9px; color:var(--tx3); background:var(--bg); border:1px solid var(--bd); border-radius:2px; padding:1px 5px; }
.shared-lbl { font-size:9px; font-weight:700; color:#D4922A; letter-spacing:.05em; text-transform:uppercase; }

.pconn { display:flex; align-items:center; padding-top:30px; width:20px; flex-shrink:0; }
.pconn-line { width:100%; height:1px; background:var(--bd2); position:relative; }
.pconn-line::after { content:''; position:absolute; right:-1px; top:-3px; border-top:3px solid transparent; border-bottom:3px solid transparent; border-left:5px solid var(--bd2); }

.clegend { display:flex; gap:20px; padding:12px 0; border-top:1px solid var(--bd); margin-top:20px; }
.legend-i { display:flex; align-items:center; gap:7px; font-size:11px; color:var(--tx3); }
.ldot-s { width:8px; height:8px; border:1px solid #D4922A; background:color-mix(in srgb,#D4922A 15%,var(--sf2)); border-radius:2px; }
.ldot-a { width:8px; height:8px; background:rgba(79,148,240,.15); background:color-mix(in srgb,#4F94F0 15%,var(--sf2)); border:1px solid rgba(79,148,240,.3); border:1px solid color-mix(in srgb,#4F94F0 30%,var(--bd)); border-radius:2px; }

@media (prefers-reduced-motion:reduce) { .card { transition:none; } }
@media (max-width:480px) { main{padding:16px 16px 48px;} .cgrid{grid-template-columns:1fr;} }
</style>

<div class="hdr">
  <div class="hdr-row">
    <span class="site-name"><strong>Spindleloom</strong> — Role Playbooks</span>
    <div class="vtgl">
      <button type="button" class="vtgl-btn on" data-view="cards" onclick="switchView('cards')">Playbook Cards</button>
      <button type="button" class="vtgl-btn" data-view="chain" onclick="switchView('chain')">Artifact Chain</button>
    </div>
  </div>
  <nav class="rtabs" id="rtabs" aria-label="Filter by role"></nav>
</div>

<main>
  <div id="cards-view"><div class="cgrid" id="cgrid"></div></div>
  <div id="chain-view" hidden>
    <div class="pipeline" id="pipeline"></div>
    <div class="clegend">
      <div class="legend-i"><div class="ldot-s"></div>Shared artifact — consumed by multiple agents</div>
      <div class="legend-i"><div class="ldot-a"></div>Agent tag — who produces this artifact</div>
    </div>
  </div>
</main>

<script>
// ── ingredient type → color ─────────────────────────────────────────
const ING_COLORS = {
  'specific feature': { fg:'#35BD7A', bg:'rgba(53,189,122,.12)', bd:'rgba(53,189,122,.28)' },
  'upstream ref':     { fg:'#4F94F0', bg:'rgba(79,148,240,.12)', bd:'rgba(79,148,240,.28)' },
  'user need':        { fg:'#9B6FF5', bg:'rgba(155,111,245,.12)', bd:'rgba(155,111,245,.28)' },
  'constraint':       { fg:'#D4922A', bg:'rgba(212,146,42,.12)',  bd:'rgba(212,146,42,.28)'  },
  'team context':     { fg:'#3DBDCF', bg:'rgba(61,189,207,.12)',  bd:'rgba(61,189,207,.28)'  },
  'business metric':  { fg:'#35BD7A', bg:'rgba(53,189,122,.12)', bd:'rgba(53,189,122,.28)' },
  'priority signal':  { fg:'#E87C35', bg:'rgba(232,124,53,.12)', bd:'rgba(232,124,53,.28)' },
  'error detail':     { fg:'#D95F5F', bg:'rgba(217,95,95,.12)',   bd:'rgba(217,95,95,.28)'   },
  'scope boundary':   { fg:'#D4922A', bg:'rgba(212,146,42,.12)',  bd:'rgba(212,146,42,.28)'  },
};

const ROLES = [
  { id:'pm',    label:'Product Manager',  color:'#4F94F0' },
  { id:'ba',    label:'Business Analyst', color:'#9B6FF5' },
  { id:'arch',  label:'Architect',        color:'#D4922A' },
  { id:'dev',   label:'Developer',        color:'#35BD7A' },
  { id:'qa',    label:'QA / Tester',      color:'#D95F5F' },
  { id:'scrum', label:'Scrum Master',     color:'#E87C35' },
  { id:'sre',   label:'SRE / DevOps',     color:'#3DBDCF' },
];

// Each prompt is a real, copy-ready example. [brackets] only to mark adapt-able parts.
// ingredients = the "what makes it good" labels shown as color-coded badges.
const SCENARIOS = [

  // ── Product Manager ─────────────────────────────────────────────────────
  { role:'pm', label:'Kick off a feature',
    prompt:'Write the PRD for the OAuth 2.0 SSO login flow. Users need to sign in with Google and GitHub. Business goal: reduce signup drop-off (ref BRD-GROWTH-001). Existing system uses username/password only.',
    ingredients:['specific feature','upstream ref','user need','constraint'],
    agent:'prd-writer', mcp:false,
    produces:['docs/PRD.md'],
    consumedBy:['frd-writer','srs-writer','backlog-manager'] },

  { role:'pm', label:'Define the business case',
    prompt:'Draft the BRD for expanding to the EU market. Key constraint: GDPR Article 6 consent required. Revenue target: €2M ARR in year 1. Primary risk: data residency obligations.',
    ingredients:['specific feature','constraint','business metric'],
    agent:'brd-writer', mcp:false,
    produces:['docs/BRD.md'],
    consumedBy:['prd-writer'] },

  { role:'pm', label:'Build the sprint backlog',
    prompt:'Generate backlog items from the PRD. Team capacity: 3 developers, 2-week sprints, 32-point velocity. Prioritise the happy path first — defer edge cases and error flows to sprint 2.',
    ingredients:['team context','priority signal'],
    agent:'backlog-manager', mcp:false,
    produces:['docs/backlog.md'],
    consumedBy:['sprint-planner'],
    tip:'Produces epics → stories → acceptance criteria, each carrying a requirement trace ID' },

  { role:'pm', label:'Trace a requirement',
    prompt:'Trace PRD-AUTH-003 through design and tests. Show every artifact that references it and flag any gaps.',
    ingredients:['upstream ref'],
    agent:'trace_requirement', mcp:true,
    produces:['traceability chain (inline)'],
    consumedBy:[] },

  { role:'pm', label:'Check coverage gaps',
    prompt:'Which PRD requirements have no corresponding FRD elaboration or test coverage yet? Focus on the auth and payment sections.',
    ingredients:['specific feature','upstream ref'],
    agent:'rtm_coverage', mcp:true,
    produces:['coverage gap report (inline)'],
    consumedBy:['qa-tester','backlog-manager'] },

  // ── Business Analyst ────────────────────────────────────────────────────
  { role:'ba', label:'Elaborate functional requirements',
    prompt:'Write the FRD for the OAuth 2.0 login flow from the PRD. Cover the authorisation code flow, silent token refresh, and session expiry. Include error states for revoked tokens and network failures.',
    ingredients:['specific feature','upstream ref','scope boundary'],
    agent:'frd-writer', mcp:false,
    produces:['docs/FRD.md'],
    consumedBy:['srs-writer','test-plan-writer','backend-developer','frontend-developer'],
    tip:'FRD is the most-shared doc in the fleet — 4 downstream agents consume it, so scope it precisely' },

  { role:'ba', label:'Write the system specification',
    prompt:'Write the SRS for the authentication service. Include non-functional requirements: 99.9% uptime SLA, <200ms p95 latency, OWASP Top 10 compliance. Exclude the notification service — that\'s a separate SRS.',
    ingredients:['specific feature','constraint','scope boundary'],
    agent:'srs-writer', mcp:false,
    produces:['docs/SRS.md'],
    consumedBy:['sdd-writer','test-plan-writer'] },

  { role:'ba', label:'Regulated-feature baseline',
    prompt:'Write the URS for the e-prescribing feature. FDA 21 CFR Part 11 applies: electronic records must be attributable, legible, contemporaneous. Trace to safety case SC-003.',
    ingredients:['specific feature','constraint','upstream ref'],
    agent:'urs-writer', mcp:false,
    produces:['docs/URS.md'],
    consumedBy:['compliance-checker','srs-writer'],
    tip:'Use for medical, financial, or government features requiring formal user-requirement traceability' },

  { role:'ba', label:'Find a requirement ID',
    prompt:'List all authentication requirements across PRD, FRD, and SRS. I need the IDs to reference in the test plan.',
    ingredients:['specific feature','upstream ref'],
    agent:'list_requirements', mcp:true,
    produces:['requirement list (inline)'],
    consumedBy:[] },

  // ── Architect ───────────────────────────────────────────────────────────
  { role:'arch', label:'Design a new system',
    prompt:'Design the architecture for the authentication service from the SRS. Hard constraints: must integrate with the existing PostgreSQL user table (no schema changes), deploy on our Kubernetes cluster, team has no Redis experience so avoid it.',
    ingredients:['specific feature','upstream ref','constraint'],
    agent:'architect', mcp:false,
    produces:['docs/SDD.md (architecture sections)'],
    consumedBy:['sdd-writer','tsd-writer','backend-developer'],
    tip:'Run solution-recon first on existing codebases — architect reads the brownfield map and avoids re-inventing what\'s already there' },

  { role:'arch', label:'Map an existing codebase',
    prompt:'Recon this codebase. Identify the current auth flow, token storage pattern, external service dependencies, and any tech debt that would affect adding OAuth. Flag integration points.',
    ingredients:['specific feature','scope boundary'],
    agent:'solution-recon', mcp:false,
    produces:['brownfield map (inline)'],
    consumedBy:['architect','sdd-writer'] },

  { role:'arch', label:'Record a technical decision',
    prompt:'Write an ADR for adopting JWT over session cookies for the auth service. Context: we need mobile API access and horizontal pod scaling. The current session cookie approach breaks with multiple replicas.',
    ingredients:['specific feature','constraint','upstream ref'],
    agent:'adr-writer', mcp:false,
    produces:['docs/decisions/ADR-NNN.md'],
    consumedBy:['architect','code-reviewer'],
    tip:'ADRs auto-link to RTM entries — run rtm_coverage after to verify dependent requirements are addressed' },

  { role:'arch', label:'Threat model a component',
    prompt:'Threat model the token service using STRIDE. Focus on spoofing (forged JWTs), tampering (payload modification), and information disclosure (token leakage in logs). Reference SRS-AUTH-NFR-008.',
    ingredients:['specific feature','upstream ref','scope boundary'],
    agent:'security-reviewer', mcp:false,
    produces:['threat model section','security findings'],
    consumedBy:['architect','backend-developer'] },

  { role:'arch', label:'Write the technical spec',
    prompt:'Write the TSD for the token service component. Cover the JWT signing key rotation procedure, refresh token storage schema, and the /auth/refresh endpoint contract. Derive from SDD section 4.2.',
    ingredients:['specific feature','upstream ref','scope boundary'],
    agent:'tsd-writer', mcp:false,
    produces:['docs/TSD.md'],
    consumedBy:['backend-developer','frontend-developer'] },

  // ── Developer ───────────────────────────────────────────────────────────
  { role:'dev', label:'Implement a backend feature',
    prompt:'Implement the token refresh endpoint per FRD-AUTH-005 and TSD section 3.1. Use the existing UserRepository — do not add new DB tables. Return 401 if the refresh token is expired or revoked, 200 with new token pair otherwise.',
    ingredients:['upstream ref','constraint','scope boundary'],
    agent:'backend-developer', mcp:false,
    produces:['code files','unit tests'],
    consumedBy:['pr-author','code-reviewer','change-verifier'],
    tip:'Including the FRD section and TSD in context keeps the agent within scope and populates the traceability comment automatically' },

  { role:'dev', label:'Build a UI component',
    prompt:'Build the login form component per FRD-AUTH-001. Required: email + password fields, Google OAuth button, "Forgot password" link. Error states: invalid credentials, account locked, network failure. Accessible — meets WCAG 2.1 AA.',
    ingredients:['upstream ref','scope boundary','constraint'],
    agent:'frontend-developer', mcp:false,
    produces:['component files','component tests'],
    consumedBy:['pr-author','code-reviewer'] },

  { role:'dev', label:'Write the PR description',
    prompt:'Write the PR description for these changes: added /auth/refresh endpoint, updated access token TTL to 15 min, added integration test for token rotation, patched the leaked-token-in-logs bug from the security review.',
    ingredients:['specific feature','upstream ref'],
    agent:'pr-author', mcp:false,
    produces:['PR title + body'],
    consumedBy:['code-reviewer'],
    tip:'Paste the diff or staged files in context — pr-author extracts requirement IDs from code comments and links them in the PR body automatically' },

  { role:'dev', label:'Review a diff',
    prompt:'Review this diff. Check for: JWT secret hardcoding, missing rate limiting on the refresh endpoint, token leakage in error responses, and adherence to the error-handling pattern in ADR-007.',
    ingredients:['specific feature','upstream ref','scope boundary'],
    agent:'code-reviewer', mcp:false,
    produces:['review comments'],
    consumedBy:['backend-developer','frontend-developer'] },

  { role:'dev', label:'Debug a failure',
    prompt:'Debug: TokenRefreshService throws "Cannot read properties of null (reading \'userId\')" on line 84 for ~3% of requests. Only happens in production, not staging. Appeared after the connection pool size change on 2024-12-10.',
    ingredients:['error detail','constraint'],
    agent:'debugger', mcp:false,
    produces:['root cause + fix'],
    consumedBy:['change-verifier'] },

  // ── QA / Tester ─────────────────────────────────────────────────────────
  { role:'qa', label:'Write a test plan',
    prompt:'Write the test plan for the OAuth 2.0 login flow from FRD sections 3.1–3.4. Cover: happy path, expired access token + valid refresh, revoked refresh token, Google OAuth callback failure, concurrent login from two devices.',
    ingredients:['upstream ref','scope boundary'],
    agent:'test-plan-writer', mcp:false,
    produces:['docs/TEST-PLAN.md'],
    consumedBy:['test-author','qa-tester'] },

  { role:'qa', label:'Generate test cases',
    prompt:'Write unit tests for TokenRefreshService. Mock UserRepository. Test cases: valid refresh returns new token pair, expired refresh returns 401, revoked token returns 401, DB unavailable returns 503, concurrent refresh race condition.',
    ingredients:['specific feature','scope boundary'],
    agent:'test-author', mcp:false,
    produces:['test files'],
    consumedBy:['qa-tester','change-verifier'] },

  { role:'qa', label:'Run QA on a feature',
    prompt:'QA test the OAuth login flow against the acceptance criteria in FRD-AUTH-001 through FRD-AUTH-008. Environment: staging with a test Google OAuth client. Flag any deviation from the expected token expiry behaviour.',
    ingredients:['upstream ref','constraint'],
    agent:'qa-tester', mcp:false,
    produces:['QA results','defect list'],
    consumedBy:['code-reviewer','release-manager'] },

  { role:'qa', label:'Find untested requirements',
    prompt:'Show me which FRD and SRS requirements for the auth service have no test coverage. Exclude URS — that\'s tracked separately.',
    ingredients:['specific feature','upstream ref','scope boundary'],
    agent:'rtm_coverage', mcp:true,
    produces:['coverage gap report (inline)'],
    consumedBy:['test-plan-writer','backlog-manager'] },

  // ── Scrum Master ────────────────────────────────────────────────────────
  { role:'scrum', label:'Plan a sprint',
    prompt:'Plan sprint 4 from the top of the backlog. Team velocity: 32 points, 3 developers. Keep the auth stories together — they have a shared dependency on the token service that needs to land in one sprint.',
    ingredients:['team context','constraint','priority signal'],
    agent:'sprint-planner', mcp:false,
    produces:['sprint plan'],
    consumedBy:['backend-developer','frontend-developer'],
    tip:'Reads backlog.md automatically. Include velocity history in context for better story selection' },

  { role:'scrum', label:'Break a story into tasks',
    prompt:'Break down BACK-042 "As a user, I can reset my password via email" into developer tasks with hour estimates. The email service is already built — tasks should only cover the reset token flow and UI.',
    ingredients:['specific feature','constraint','scope boundary'],
    agent:'backlog-manager', mcp:false,
    produces:['task breakdown'],
    consumedBy:['sprint-planner'] },

  { role:'scrum', label:'Facilitate retrospective',
    prompt:'Facilitate the sprint 3 retrospective. We shipped the login flow but missed the token refresh endpoint — it moved to sprint 4. The team felt context switching between the auth work and the hotfix hurt velocity.',
    ingredients:['specific feature','constraint'],
    agent:'retrospective-facilitator', mcp:false,
    produces:['retro notes','action items'],
    consumedBy:['sprint-planner'] },

  { role:'scrum', label:'Check funnel health',
    prompt:'What is the current state of the spec funnel? I need to know if PRD and FRD are complete before sprint planning tomorrow.',
    ingredients:['specific feature'],
    agent:'funnel_status', mcp:true,
    produces:['funnel overview (inline)'],
    consumedBy:[] },

  // ── SRE / DevOps ────────────────────────────────────────────────────────
  { role:'sre', label:'Define SLOs',
    prompt:'Design SLOs for the authentication service. Base them on SRS-AUTH-NFR-001 (99.9% uptime) and SRS-AUTH-NFR-003 (<200ms p95). We use Prometheus + Grafana. Login and token refresh are the critical user journeys.',

// helpers
function rc(id) { const r = ROLES.find(r=>r.id===id); return r?r.color:'#7A8DA3'; }
function rl(id) { const r = ROLES.find(r=>r.id===id); return r?r.label:id; }

function ingHtml(ings) {
  if (!ings||!ings.length) return '';
  const chips = ings.map(i => {
    const c = ING_COLORS[i] || { fg:'#7A8DA3', bg:'rgba(122,141,163,.1)', bd:'rgba(122,141,163,.25)' };
    return `<span class="ing" style="color:${c.fg};background:${c.bg};border-color:${c.bd}">${i}</span>`;
  }).join('');
  return `<div class="ing-row">${chips}</div>`;
}

// render tabs
function renderTabs() {
  const nav = document.getElementById('rtabs');
  const all = document.createElement('button');
  all.type='button'; all.className='rtab on'; all.dataset.role='all'; all.textContent='All roles';
  all.onclick=()=>filter('all'); nav.appendChild(all);
  ROLES.forEach(r=>{
    const b=document.createElement('button');
    b.type='button'; b.className='rtab'; b.dataset.role=r.id;
    b.style.setProperty('--rc',r.color);
    b.innerHTML=`<span class="rdot"></span>${r.label}`;
    b.onclick=()=>filter(r.id); nav.appendChild(b);
  });
}

// render cards
function renderCards() {
  const g=document.getElementById('cgrid'); g.innerHTML='';
  SCENARIOS.forEach(s=>{
    const card=document.createElement('div');
    card.className='card'; card.dataset.role=s.role;
    card.style.setProperty('--rc',rc(s.role));

    const conHtml = s.consumedBy.length
      ? `<div class="crow"><div class="clabel">Consumed by</div>
         <div class="cclist">${s.consumedBy.map(a=>`<span class="ccchip">${a}</span>`).join('')}</div></div>`
      : '';
    const tipHtml = s.tip ? `<div class="ctip">${s.tip}</div>` : '';
    const agHtml = s.mcp
      ? `<span class="achip mcp">⬡ MCP: ${s.agent}</span>`
      : `<span class="achip">${s.agent}</span>`;

    card.innerHTML=`
      <div class="card-hd">
        <span class="card-label">${s.label}</span>
        <span class="card-role">${rl(s.role)}</span>
      </div>
      <div class="card-bd">
        <div class="prompt-wrap">
          <div class="prompt-box"><span class="prompt-text">${s.prompt}</span></div>
          ${ingHtml(s.ingredients)}
        </div>
        <div class="crow"><div class="clabel">Triggers</div>${agHtml}</div>
        <div class="crow"><div class="clabel">Produces</div>
          <div class="apills">${s.produces.map(p=>`<span class="apill">${p}</span>`).join('')}</div>
        </div>
        ${conHtml}${tipHtml}
      </div>`;
    g.appendChild(card);
  });
}

// filter
function filter(roleId) {
  document.querySelectorAll('.rtab').forEach(t=>t.classList.toggle('on',t.dataset.role===roleId));
  document.querySelectorAll('.card').forEach(c=>{c.hidden=roleId!=='all'&&c.dataset.role!==roleId;});
}

// render chain
function renderChain() {
  const c=document.getElementById('pipeline'); c.innerHTML='';
  PIPELINE.forEach((ph,pi)=>{
    if(pi>0){ const conn=document.createElement('div'); conn.className='pconn'; conn.innerHTML='<div class="pconn-line"></div>'; c.appendChild(conn); }
    const phEl=document.createElement('div'); phEl.className='pphase';
    phEl.innerHTML=`<div class="pphase-hd">${ph.phase}</div>`;
    const nodes=document.createElement('div'); nodes.className='pnodes';
    ph.nodes.forEach(n=>{
      const nd=document.createElement('div'); nd.className='pnode';
      const ags=n.agents.map(a=>`<span class="ptag" style="--rc:${rc(a.r)}">${a.n}</span>`).join('');
      const cons=n.cons.length?`<div class="pcons">${n.cons.map(x=>`<span class="pctag">→ ${x}</span>`).join('')}</div>`:'';
      const shl=n.shared?`<div class="shared-lbl">shared</div>`:'';
      nd.innerHTML=`<div class="pnode-doc">${shl}<div class="pnode-name">${n.doc}</div><div class="pnode-agents">${ags}</div>${cons}</div>`;
      nodes.appendChild(nd);
    });
    phEl.appendChild(nodes); c.appendChild(phEl);
  });
}

// view switch
function switchView(v) {
  document.getElementById('cards-view').hidden=v!=='cards';
  document.getElementById('chain-view').hidden=v!=='chain';
  document.querySelectorAll('.vtgl-btn').forEach(b=>b.classList.toggle('on',b.dataset.view===v));
  document.getElementById('rtabs').style.opacity=v==='cards'?'1':'0.35';
  document.getElementById('rtabs').style.pointerEvents=v==='cards'?'':'none';
}

renderTabs(); renderCards(); renderChain();
</script>
