<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>Spindleloom Persona Hub</title>
<style>
/* ── tokens: indigo dusk (dark, primary) / bleached linen (light) ── */
:root{
  --ground:#0E1524; --panel:#141E2E; --panel-2:#18263A;
  --ink:#DBE5F1; --ink-mid:#93A6BC; --ink-dim:#5F7791; --hair:#1E2E45; --hair-2:#2A3E5C;
  --gold:#CFA23A; --gold-hi:#E7BE58; --weft:#5C90BE; --weft-dim:#3A5E80;
  --good:#4FAE7C; --crit:#CF6B65;
  --shadow:0 1px 0 rgba(255,255,255,.03),0 14px 34px rgba(0,0,0,.34);
  --serif:"Hoefler Text","Iowan Old Style","Palatino Linotype",Palatino,Georgia,serif;
  --sans:ui-sans-serif,-apple-system,"Segoe UI",Roboto,"Helvetica Neue",Arial,sans-serif;
  --mono:ui-monospace,"SF Mono","Cascadia Code","JetBrains Mono",Menlo,Consolas,monospace;
}
@media (prefers-color-scheme:light){:root{
  --ground:#E9EAE5; --panel:#FFFFFF; --panel-2:#F3F3EF;
  --ink:#16202E; --ink-mid:#47586B; --ink-dim:#7C8B9B; --hair:#DEDFD8; --hair-2:#C9CBC1;
  --gold:#96701A; --gold-hi:#7C5D12; --weft:#3C6C93; --weft-dim:#A9B9C7;
  --good:#2E7D57; --crit:#A5423E;
  --shadow:0 1px 2px rgba(20,27,38,.05),0 12px 30px rgba(20,27,38,.07);
}}
:root[data-theme="light"]{--ground:#E9EAE5;--panel:#FFFFFF;--panel-2:#F3F3EF;--ink:#16202E;--ink-mid:#47586B;--ink-dim:#7C8B9B;--hair:#DEDFD8;--hair-2:#C9CBC1;--gold:#96701A;--gold-hi:#7C5D12;--weft:#3C6C93;--weft-dim:#A9B9C7;--good:#2E7D57;--crit:#A5423E;--shadow:0 1px 2px rgba(20,27,38,.05),0 12px 30px rgba(20,27,38,.07)}
:root[data-theme="dark"]{--ground:#0E1524;--panel:#141E2E;--panel-2:#18263A;--ink:#DBE5F1;--ink-mid:#93A6BC;--ink-dim:#5F7791;--hair:#1E2E45;--hair-2:#2A3E5C;--gold:#CFA23A;--gold-hi:#E7BE58;--weft:#5C90BE;--weft-dim:#3A5E80;--good:#4FAE7C;--crit:#CF6B65;--shadow:0 1px 0 rgba(255,255,255,.03),0 14px 34px rgba(0,0,0,.34)}

*{box-sizing:border-box;margin:0;padding:0}
html{scroll-behavior:smooth}
body{background:var(--ground);color:var(--ink);font-family:var(--sans);font-size:16px;line-height:1.62;-webkit-font-smoothing:antialiased;overflow-x:hidden}
a{color:var(--gold);text-decoration:none}a:hover{text-decoration:underline}
code,kbd,pre{font-family:var(--mono)}
::selection{background:color-mix(in srgb,var(--gold) 30%,transparent)}
:focus-visible{outline:2px solid var(--gold);outline-offset:2px;border-radius:2px}
b,strong{color:var(--ink)}

/* ── persistent bar ── */
.bar{position:sticky;top:0;z-index:80;display:flex;align-items:center;gap:14px;padding:11px 26px;
  background:color-mix(in srgb,var(--ground) 88%,transparent);backdrop-filter:blur(9px);border-bottom:1px solid var(--hair)}
.bar .brand{display:flex;align-items:center;gap:10px;font-family:var(--mono);font-size:11px;letter-spacing:.24em;
  text-transform:uppercase;color:var(--ink-dim);white-space:nowrap;cursor:pointer}
.bar .brand b{color:var(--gold)}
.bar .brand:hover{color:var(--ink);text-decoration:none}
.bar select{margin-left:auto;font-family:var(--mono);font-size:12px;color:var(--ink);background:var(--panel);
  border:1px solid var(--hair-2);border-radius:7px;padding:7px 10px;max-width:270px;cursor:pointer}
.toggle{font-family:var(--mono);font-size:11px;color:var(--ink-mid);background:transparent;border:1px solid var(--hair-2);
  border-radius:20px;padding:6px 13px;cursor:pointer;white-space:nowrap}
.toggle:hover{border-color:var(--gold);color:var(--gold)}

#app{outline:none}

/* ── hub ── */
.hub-hero{position:relative;overflow:hidden;border-bottom:1px solid var(--hair)}
.hub-hero svg{position:absolute;inset:0;width:100%;height:100%}
.hub-hero .veil{position:absolute;inset:0;background:linear-gradient(180deg,transparent 20%,var(--ground) 96%)}
.hub-hero .in{position:relative;max-width:1120px;margin:0 auto;padding:58px 30px 44px;text-align:left}
.kicker{font-family:var(--mono);font-size:11px;letter-spacing:.32em;text-transform:uppercase;color:var(--ink-dim)}
.hub-hero h1{font-family:var(--serif);font-weight:600;font-size:clamp(36px,5.4vw,58px);line-height:1;letter-spacing:-.02em;margin:12px 0 0;text-wrap:balance}
.hub-hero h1 em{font-style:italic;color:var(--gold)}
.hub-sub{font-family:var(--serif);font-size:18px;color:var(--ink-mid);margin-top:14px;max-width:52ch;text-wrap:pretty}
.searchbox{position:relative;margin-top:26px;max-width:560px}
.searchbox input{width:100%;font-family:var(--mono);font-size:14px;color:var(--ink);background:var(--panel);
  border:1px solid var(--hair-2);border-radius:9px;padding:12px 15px 12px 40px}
.searchbox input::placeholder{color:var(--ink-dim)}
.searchbox .ico{position:absolute;left:14px;top:12px;color:var(--ink-dim);font-size:14px}
.results{position:absolute;left:0;right:0;top:calc(100% + 6px);z-index:70;background:var(--panel);border:1px solid var(--hair-2);
  border-radius:9px;box-shadow:var(--shadow);max-height:300px;overflow:auto;display:none}
.results.show{display:block}
.results a{display:flex;justify-content:space-between;gap:12px;padding:10px 14px;border-bottom:1px solid var(--hair);color:var(--ink);font-size:13.5px}
.results a:last-child{border-bottom:0}
.results a:hover{background:var(--panel-2);text-decoration:none}
.results .kind{font-family:var(--mono);font-size:10.5px;color:var(--ink-dim);white-space:nowrap}
.results .kind b{color:var(--gold);font-weight:400}

.hubwrap{max-width:1120px;margin:0 auto;padding:34px 30px 70px}
.cards{display:grid;grid-template-columns:repeat(3,1fr);gap:16px}
@media (max-width:940px){.cards{grid-template-columns:repeat(2,1fr)}}
@media (max-width:600px){.cards{grid-template-columns:1fr}}
.pcard{display:block;background:var(--panel);border:1px solid var(--hair);border-radius:12px;padding:18px 19px;
  box-shadow:var(--shadow);transition:transform .15s,border-color .15s;color:var(--ink)}
.pcard:hover{transform:translateY(-2px);border-color:var(--gold);text-decoration:none}
.pcard .no{font-family:var(--mono);font-size:11px;color:var(--gold);letter-spacing:.1em}
.pcard h3{font-family:var(--serif);font-size:20px;font-weight:600;letter-spacing:-.01em;margin:7px 0 2px}
.pcard .alt{font-family:var(--mono);font-size:10.5px;letter-spacing:.06em;text-transform:uppercase;color:var(--ink-dim)}
.pcard .mi{font-size:13.5px;color:var(--ink-mid);margin:10px 0 12px;line-height:1.55;min-height:3.1em}
.pcard .meta{display:flex;flex-wrap:wrap;gap:6px}
.pcard .m{font-family:var(--mono);font-size:10.5px;color:var(--ink-dim);border:1px solid var(--hair);border-radius:20px;padding:3px 9px}
.pcard .m.g{color:var(--gold);border-color:color-mix(in srgb,var(--gold) 40%,var(--hair))}

/* ── persona detail ── */
.crumb{max-width:1080px;margin:0 auto;padding:20px 30px 0;font-family:var(--mono);font-size:11px;letter-spacing:.08em;color:var(--ink-dim)}
.crumb a{color:var(--ink-dim)}.crumb a:hover{color:var(--gold)}
.phero{position:relative;overflow:hidden;border-bottom:1px solid var(--hair)}
.phero svg{position:absolute;inset:0;width:100%;height:100%;opacity:.85}
.phero .veil{position:absolute;inset:0;background:linear-gradient(105deg,var(--ground) 36%,transparent 84%)}
.phero .in{position:relative;max-width:1080px;margin:0 auto;padding:44px 30px 40px}
.phero h1{font-family:var(--serif);font-weight:600;font-size:clamp(34px,5.6vw,58px);line-height:.99;letter-spacing:-.02em;margin:12px 0 0;text-wrap:balance}
.phero h1 em{font-style:italic;color:var(--gold)}
.phero .role{font-family:var(--mono);font-size:12px;letter-spacing:.08em;color:var(--ink-mid);margin-top:12px;text-transform:uppercase}
.thesis{font-family:var(--serif);font-size:clamp(17px,2.2vw,21px);line-height:1.5;color:var(--ink);margin-top:16px;max-width:38ch;text-wrap:pretty}
.thesis b{color:var(--gold)}
.facts{display:flex;flex-wrap:wrap;gap:24px;margin-top:24px}
.fact .n{font-family:var(--serif);font-size:27px;color:var(--gold-hi);line-height:1;font-variant-numeric:tabular-nums}
.fact .l{font-family:var(--mono);font-size:10px;letter-spacing:.13em;text-transform:uppercase;color:var(--ink-dim);margin-top:5px}

.layout{max-width:1080px;margin:0 auto;padding:0 30px;display:grid;grid-template-columns:196px 1fr;gap:46px;align-items:start}
@media (max-width:900px){.layout{grid-template-columns:1fr;gap:0}.spine{display:none}}
.spine{position:sticky;top:72px;padding-top:44px}
.spine ol{list-style:none;position:relative;padding-left:20px}
.spine ol::before{content:"";position:absolute;left:4px;top:6px;bottom:6px;width:1px;background:linear-gradient(180deg,var(--weft-dim),var(--gold),var(--weft-dim))}
.spine li{position:relative;margin:2px 0}
.spine a{display:block;font-size:12.5px;color:var(--ink-dim);padding:5px 0}
.spine li::before{content:"";position:absolute;left:-19px;top:12px;width:7px;height:7px;border-radius:50%;background:var(--panel);border:1px solid var(--hair-2);transition:.15s}
.spine a:hover{color:var(--ink);text-decoration:none}
.spine li.on a{color:var(--gold)}
.spine li.on::before{background:var(--gold);border-color:var(--gold);box-shadow:0 0 0 3px color-mix(in srgb,var(--gold) 22%,transparent)}

.content{min-width:0;padding:44px 0 30px}
section{margin:0 0 44px;scroll-margin-top:76px}
.sh{display:flex;align-items:baseline;gap:12px;margin-bottom:16px;padding-bottom:9px;border-bottom:1px solid var(--hair)}
.sh .n{font-family:var(--mono);font-size:12px;color:var(--gold)}
.sh h2{font-family:var(--serif);font-size:20px;font-weight:600;letter-spacing:-.01em}
.sh .note{margin-left:auto;font-family:var(--mono);font-size:10.5px;letter-spacing:.1em;text-transform:uppercase;color:var(--ink-dim)}
p{margin:0 0 13px;max-width:66ch;color:var(--ink-mid)}
.cmd{font-family:var(--mono);font-size:12.5px;color:var(--gold);white-space:nowrap}

.qhead{font-family:var(--mono);font-size:10.5px;letter-spacing:.18em;text-transform:uppercase;color:var(--gold);margin:26px 0 12px}
.qs{display:grid;grid-template-columns:repeat(3,1fr);border:1px solid var(--hair);border-radius:10px;overflow:hidden;background:var(--panel)}
@media (max-width:640px){.qs{grid-template-columns:1fr}}
.qs .step{padding:15px 17px;border-right:1px solid var(--hair)}
.qs .step:last-child{border-right:0}
@media (max-width:640px){.qs .step{border-right:0;border-bottom:1px solid var(--hair)}.qs .step:last-child{border-bottom:0}}
.qs .k{font-family:var(--mono);font-size:11px;color:var(--gold)}
.qs .c{font-family:var(--mono);font-size:13px;color:var(--ink);font-weight:600;margin:6px 0 4px}
.qs .d{font-size:12.5px;color:var(--ink-mid);line-height:1.5}

.io{display:grid;grid-template-columns:1fr 1fr;gap:15px}
@media (max-width:560px){.io{grid-template-columns:1fr}}
.io .b{background:var(--panel);border:1px solid var(--hair);border-radius:10px;padding:15px 17px;box-shadow:var(--shadow)}
.io .b.o{border-top:2px solid var(--gold)}
.io h3{font-family:var(--mono);font-size:10px;letter-spacing:.14em;text-transform:uppercase;color:var(--ink-dim);margin-bottom:9px}
.io ul{list-style:none;display:grid;gap:7px}
.io li{font-size:13.5px;color:var(--ink-mid);padding-left:15px;position:relative}
.io li::before{content:"›";position:absolute;left:0;color:var(--gold)}

.tbl{width:100%;border-collapse:collapse;font-size:14px}
.tbl th{text-align:left;font-family:var(--mono);font-size:10px;letter-spacing:.12em;text-transform:uppercase;color:var(--ink-dim);padding:0 12px 9px 0;border-bottom:1px solid var(--hair-2)}
.tbl td{padding:10px 12px 10px 0;border-bottom:1px solid var(--hair);vertical-align:top;color:var(--ink-mid)}
.tbl tr:hover td{color:var(--ink)}
.tbl td.a{font-family:var(--mono);font-size:13px;color:var(--ink);white-space:nowrap}

ol.flow{list-style:none;counter-reset:s}
ol.flow li{counter-increment:s;position:relative;padding:13px 0 13px 46px;border-bottom:1px dashed var(--hair);color:var(--ink-mid);max-width:70ch}
ol.flow li:last-child{border-bottom:0}
ol.flow li::before{content:counter(s,decimal-leading-zero);position:absolute;left:0;top:13px;font-family:var(--mono);font-size:12px;color:var(--gold);border:1px solid var(--hair-2);border-radius:6px;padding:3px 7px}

.calls{display:grid;gap:10px}
.call{display:grid;grid-template-columns:96px 1fr;gap:15px;align-items:start;background:var(--panel);border:1px solid var(--hair);border-radius:10px;padding:13px 15px}
.call .tag{font-family:var(--mono);font-size:9.5px;letter-spacing:.09em;text-transform:uppercase;color:var(--gold);background:color-mix(in srgb,var(--gold) 12%,transparent);border-radius:5px;padding:5px 7px;text-align:center}
.call.warn .tag{color:var(--crit);background:color-mix(in srgb,var(--crit) 13%,transparent)}
.call .q{font-family:var(--serif);font-size:15px;color:var(--ink);margin-bottom:3px}
.call .aa{font-size:13.5px;color:var(--ink-mid)}

.prompt{background:var(--panel);border:1px solid var(--hair);border-radius:11px;margin-bottom:13px;overflow:hidden;box-shadow:var(--shadow);transition:transform .14s,border-color .14s}
.prompt:hover{border-color:var(--hair-2);transform:translateY(-1px)}
.prompt .ph{display:flex;justify-content:space-between;align-items:baseline;gap:12px;padding:12px 15px 10px}
.prompt .nm{font-family:var(--serif);font-size:16px;color:var(--ink)}
.prompt .wn{font-size:12.5px;color:var(--ink-dim);margin-top:2px}
.prompt .tg{font-family:var(--mono);font-size:10.5px;color:var(--gold);background:color-mix(in srgb,var(--gold) 12%,transparent);border-radius:5px;padding:3px 9px;white-space:nowrap}
.prompt .bd{position:relative;border-top:1px solid var(--hair);background:var(--panel-2)}
.prompt pre{font-size:13px;line-height:1.72;color:var(--ink);padding:14px 15px;white-space:pre-wrap;word-break:break-word;overflow-x:auto}
.prompt pre .v{color:var(--gold-hi)}
.copy{position:absolute;top:10px;right:10px;font-family:var(--mono);font-size:10px;letter-spacing:.06em;text-transform:uppercase;color:var(--ink-dim);background:var(--ground);border:1px solid var(--hair-2);border-radius:6px;padding:5px 10px;cursor:pointer}
.copy:hover{color:var(--gold);border-color:var(--gold)}
.copy.done{color:var(--good);border-color:var(--good)}

.grid2{display:grid;grid-template-columns:1fr 1fr;gap:22px}
@media (max-width:560px){.grid2{grid-template-columns:1fr}}
.blk h3{font-family:var(--mono);font-size:10.5px;letter-spacing:.12em;text-transform:uppercase;color:var(--gold);margin-bottom:10px}
.blk ul{list-style:none;display:grid;gap:8px}
.blk li{font-size:14px;color:var(--ink-mid);padding-left:16px;position:relative}
.blk li::before{content:"—";position:absolute;left:0;color:var(--weft)}
.chips{display:flex;flex-wrap:wrap;gap:8px}
.chip{font-family:var(--mono);font-size:11.5px;color:var(--ink-mid);background:var(--panel);border:1px solid var(--hair);border-radius:20px;padding:5px 12px}

.loom{background:var(--panel);border:1px solid var(--hair);border-radius:12px;padding:8px 20px;box-shadow:var(--shadow)}
.loom .row{display:grid;grid-template-columns:150px 1fr;gap:16px;align-items:center;padding:12px 0;border-bottom:1px dashed var(--hair)}
.loom .row:last-child{border-bottom:0}
.loom .to{font-family:var(--mono);font-size:12px;display:flex;align-items:center;gap:8px}
.loom .to a{color:var(--gold)}
.loom .to::before{content:"";width:20px;height:2px;flex-shrink:0;background:linear-gradient(90deg,var(--weft),var(--gold));border-radius:2px}
.loom .need{font-size:13.5px;color:var(--ink-mid)}

.kpi{display:grid;grid-template-columns:repeat(2,1fr);gap:12px}
@media (max-width:560px){.kpi{grid-template-columns:1fr}}
.kpi .k{background:var(--panel);border:1px solid var(--hair);border-left:2px solid var(--weft);border-radius:8px;padding:12px 15px}
.kpi .k b{display:block;font-family:var(--serif);font-size:15.5px;color:var(--ink);margin-bottom:2px}
.kpi .k span{font-size:13px;color:var(--ink-mid)}

.glo{columns:2;column-gap:30px}
@media (max-width:560px){.glo{columns:1}}
.glo div{break-inside:avoid;font-size:13.5px;color:var(--ink-mid);padding:6px 0;border-bottom:1px solid var(--hair)}
.glo b{font-family:var(--mono);font-size:12.5px;color:var(--ink)}

.pager{display:flex;justify-content:space-between;gap:14px;margin:8px 0 0;flex-wrap:wrap}
.pager a{display:block;background:var(--panel);border:1px solid var(--hair);border-radius:10px;padding:13px 17px;min-width:220px;color:var(--ink);flex:1}
.pager a:hover{border-color:var(--gold);text-decoration:none}
.pager .dir{font-family:var(--mono);font-size:10px;letter-spacing:.14em;text-transform:uppercase;color:var(--ink-dim)}
.pager .nm{font-family:var(--serif);font-size:17px;margin-top:3px}
.pager a.next{text-align:right}

footer{border-top:1px solid var(--hair);margin-top:44px}
.foot{max-width:1080px;margin:0 auto;padding:22px 30px 54px;font-size:13px;color:var(--ink-dim)}
.foot a{color:var(--ink-dim);text-decoration:underline}

.reveal{opacity:0;transform:translateY(10px)}
.reveal.in{opacity:1;transform:none;transition:opacity .5s ease,transform .5s ease}
@media (prefers-reduced-motion:reduce){
  html{scroll-behavior:auto}
  .reveal{opacity:1!important;transform:none!important;transition:none!important}
  *{transition:none!important}
}
@media print{.bar,.spine,.copy,.pager,.searchbox{display:none}body{background:#fff}}

/* ── Woven Loop hero (hub) ── */
.hub-grid{display:block}
.loopwrap{display:flex;flex-direction:column;align-items:center;gap:12px;margin:30px auto 4px;width:min(480px,92vw)}
.loopcanvas{display:block;width:100%;height:auto;max-width:480px}
.loopread{font-family:var(--mono);font-size:11.5px;letter-spacing:.06em;color:var(--ink-mid);display:flex;align-items:center;gap:8px;text-transform:uppercase}
.loopread b{color:var(--gold);font-weight:600;letter-spacing:.04em}
.loopread .pip{width:8px;height:8px;border-radius:50%;background:var(--gold);box-shadow:0 0 8px var(--gold)}
@media (min-width:1024px){
  .hub-grid{display:flex;align-items:center;gap:clamp(24px,4vw,56px)}
  .htext{flex:1;min-width:0}
  .loopwrap{flex:0 0 auto;margin:0}
}
@media (prefers-reduced-motion:reduce){.loopread .pip{box-shadow:none}}
</style>
</head>

/* ════ DATA — 11 personas. PO carries exemplar full depth; the rest carry the core operating set. ════ */
const P=[
{id:"product-owner",no:"01",name:"Product Owner",alt:"/ Business Analyst",
 mission:"You hold the first threads and tie the <b>golden thread of traceability</b> — from a market problem down to a Ready, traceable backlog — and you <b>accept</b> each phase before it flows on.",
 card:"Owner of value, scope and the acceptance gates — market problem to Ready backlog.",
 span:["Discovery","Requirements","Planning"],accepts:3,
 agents:[["doc-strategy-advisor","/spec-new","Picks the doc set you need (Lean/Mid/Enterprise) and assigns owners — <b>your entry point</b>."],
  ["mrd-writer","/spec-new","Market problem, personas, competitive landscape."],
  ["brd-writer","/spec-new","Business goals, ROI, scope — seeds the RTM with BR-* IDs."],
  ["prd-writer","/spec-new","Product behaviour: stories, features, acceptance criteria. Your authority doc."],
  ["frd-writer","/spec-new","Exact behaviour, flows, edge and error cases."],
  ["srs-writer","/spec-new","Technical constraints, NFR budgets, compliance obligations."],
  ["urs-writer","/spec-new","Regulated user requirements (FDA/GAMP) — when validation is mandatory."],
  ["backlog-manager","/plan-next","PRD/FRD → INVEST backlog, ordered, DoR-gated, RTM-traced."],
  ["product-analytics","—","Instruments PRD success metrics; a missed metric spawns backlog work."]],
 shared:"Shared with the Delivery Lead: <code>status-reporter</code>, <code>raid-keeper</code>.",
 skills:["requirement-quality","requirement-elicitation","ubiquitous-language","backlog-decomposition","traceability-rtm","relative-estimation","analytics-instrumentation"],
 gates:["Phase acceptance — your ACCEPTED token is the gate; advance and CI refuse without it","Definition of Ready — statement, testable AC, estimate, no blockers, INVEST"],
 pitfalls:["Specs that never become work","No “so that” (no value) or no AC (untestable)","Scope creep — every PBI traces to a Req-ID","Accepting a phase you didn't review"],
 handoff:[["architect","PRD + FRD + SRS <b>accepted</b>; RTM seeded; open assumptions tagged"],
  ["delivery-lead","backlog <b>ordered</b>, DoR-met, estimable"],
  ["qa","acceptance criteria are observable <b>Given / When / Then</b>"],
  ["sre-release","success metrics <b>defined & instrumented</b>"]],
 prompts:[["Set up the spec set","Starting a new product or feature area","/spec-new",["For «product», a «Lean|Mid|Enterprise» team, select the document set we need and assign","owners. We are «regulated: yes/no». Recommend the leanest set that still covers our risk."]],
  ["Draft the PRD","Business case is accepted","prd-writer",["Write the PRD for «feature» from docs/brd.md: user stories with Given/When/Then acceptance","criteria, MoSCoW priority, and success metrics. Trace every story to a BR- id in the RTM."]],
  ["Specify exact behaviour (FRD)","PRD stories need precise logic","frd-writer",["Write the FRD for «feature» from the PRD: exact flows, state changes, and edge/error cases.","Trace each FRD- id to its PRD- id; flag ambiguity rather than guessing."]],
  ["Decompose to a backlog","Requirements are accepted","/plan-next",["Break docs/prd.md and the «feature» FRD into epics and INVEST user stories with G/W/T","acceptance criteria, ordered by MoSCoW, each tracing to a Req-id. Save it as the backlog."]],
  ["Split an oversized story","A story is too big to estimate","backlog-manager",["PBI-«EPIC»-007 is too big to estimate. Split into 2–4 independently valuable stories,","vertically (never UI/DB layers), each still tracing back to FRD-«…»."]],
  ["Pull the next Ready item","The team needs work to start","/plan-next",["What is the next pullable PBI — dependencies done and Definition of Ready met?","Return its acceptance criteria and the upstream Req-ids it traces to."]],
  ["Accept a phase boundary","After you have reviewed the phase output","gate",["sloom approve requirements --feature «slug» --role product-owner --by \"«your name»\"","# only after you have actually read and agree with the requirements set"]],
  ["Weekly stakeholder status","End of sprint / reporting cadence","/ops-status",["Produce a RAG status for «exec | delivery | customer» from the RAID log and the last","sprint's delivery metrics: health, what shipped, what's at risk, and the ask."]]],
 qs:[["01","/spec-new","Pick the doc set for your team size; it names owners. Once per product: /spec-constitution."],
  ["02","draft PRD → FRD","Run prd-writer then frd-writer; then sloom approve requirements … to open the gate."],
  ["03","/plan-next","backlog-manager decomposes to a Ready, ordered, RTM-traced backlog the team can pull."]],
 io:{inp:["The client brief / market signal","Stakeholder goals and constraints","Discovered work flowing back up — bugs, postmortems, tech-debt, missed metrics"],
  out:["Accepted MRD · BRD · PRD · FRD · SRS (· URS if regulated)","A Ready, ordered <b>backlog</b> (PBI-*), every item traced to a Req-ID","A seeded <b>RTM</b> + an <b>ACCEPTED</b> token at each phase boundary"]},
 flow:["<b>Frame it.</b> <span class=cmd>/spec-new</span> → doc-strategy-advisor picks your doc set and names owners.",
  "<b>Justify it.</b> mrd-writer → brd-writer establish market + business case; BR-* IDs seed the RTM.",
  "<b>Specify it.</b> prd-writer → frd-writer → srs-writer (urs-writer in parallel if regulated). Then <b>accept</b>: <span class=cmd>sloom approve requirements --feature «slug» --role product-owner --by \"«you»\"</span>.",
  "<b>Hand to design.</b> The Architect consumes your PRD/FRD/SRS; you accept design before planning.",
  "<b>Make it buildable.</b> <span class=cmd>/plan-next</span> → backlog-manager decomposes into a Ready, ordered backlog.",
  "<b>Track and learn.</b> Status and RAID for stakeholders; product-analytics closes the build→learn loop into new backlog work."],
 decide:[["regulated?","The product is medical / financial / safety-critical.","Add <code>urs-writer</code> in parallel with the PRD; validation drives acceptance depth."],
  ["brownfield?","You're extending an existing codebase.","Run <span class=cmd>/build-recon</span> <b>before</b> finalising stories — confirm the endpoints/data exist."],
  ["too big?","A story can't be estimated / won't fit a sprint.","Split it <b>vertically</b> (never UI/DB layers); a missing endpoint becomes a blocking backend <em>enabler</em> PBI."],
  ["a choice?","The work is a forced architecture decision, not code.","Type it a <b>Decision</b> PBI → architect → adr-writer (produces an ADR, not a PR)."]],
 kpis:[["Requirement stability","low churn on accepted specs — re-opens signal weak upfront framing"],
  ["Traceability = 100%","every PBI traces to a Req-ID; empty RTM cells are a gap, not done"],
  ["Backlog readiness","enough DoR-met items to keep the team pulling without stalls"],
  ["Value realised","shipped features move the PRD success metric"]],
 trouble:[["DUP-REQID","Two branches minted the same Req-ID and merged clean.","Mint on a branch, merge to main first (the PR gate runs DUP-REQID), then push."],
  ["empty RTM","The RTM's tracker column is blank after a board push.","Write the work-item IDs back — an empty column is a traceability gap (emit_backlog.py automates it)."],
  ["phantom PBI","PBI-UNDEFINED: referenced in deps/sprint, no backlog row.","Give it a ranked, AC-bearing row, or remove the reference."],
  ["range","PBI-X-001..006 orphaned the middle IDs.","Write every ID out in full — range shorthand is invisible to the validators."]],
 glossary:[["BR/PRD/FRD/SRS/URS","the requirement docs, top→bottom of the funnel"],["PBI","Product Backlog Item (usually a user story)"],
  ["RTM","Requirements Traceability Matrix; threads Req-ID → PBI → test"],["Req-ID","a stable DOC-AREA-NUM identifier"],
  ["INVEST","Independent · Negotiable · Valuable · Estimable · Small · Testable"],["MoSCoW","Must / Should / Could / Won't priority"],
  ["DoR / DoD","Definition of Ready (in) / Done (out)"],["Acceptance token","your signed ACCEPTED file at a phase boundary"]]},

  ["tsd-writer","/spec-new","Technical spec — pinned stack, endpoint specs, deploy/rollback procedures."],
  ["adr-writer","/spec-adr","Immutable, append-only Architecture Decision Records with rationale."],
  ["rfc-facilitator","/spec-rfc","Design proposals opened for comment before building; an accepted RFC produces an ADR."],
  ["api-designer","—","Contract-first APIs: OpenAPI/GraphQL schemas, auth, versioning policy."],

  ["tech-radar-curator","/tech-radar","Adopt / Trial / Assess / Hold rings aligned to accumulated ADRs."]],

  ["security","SDD + trust boundaries, ready for the threat model"],
  ["product-owner","reality-check feedback: infeasible or costly requirements pushed back upstream"],
  ["delivery-lead","Decision PBIs typed and routed (ADR, not PR)"]],
 prompts:[["Draft the SDD","Requirements are accepted","sdd-writer",["Write the SDD for «feature» from the accepted PRD/FRD/SRS: arc42/C4 components, data flows,","trade-off table, reliability plan. Map every SR- constraint to a component decision."]],
  ["Record a decision","A significant choice was made","/spec-adr",["Record the decision to «choose X over Y» for «feature»: context, options weighed, decision,","consequences. Append-only — supersede rather than edit."]],
  ["Open an RFC","A change needs debate before building","/spec-rfc",["Open an RFC for «significant change»: problem, proposal, alternatives, blast radius.","Circulate for comment; on acceptance, resolve it into an ADR."]],
  ["Design the API contract","Before FE/BE build in parallel","api-designer",["Design the OpenAPI contract for «feature»: endpoints, auth, versioning policy, error model —","contract-first, so frontend, backend and tests build against the same spec."]]]},

  ["docs-curator","behaviour changes that need user-facing docs"],
  ["delivery-lead","honest status on the run ledger — done means verified"]],
 prompts:[["Recon before building","Starting any brownfield PBI","/build-recon",["Before I start PBI-«ID», recon the codebase: does «endpoint/data» exist, which patterns and","helpers should I reuse, and is this FE-only or backend-first?"]],
  ["Implement the PBI","The item is Ready and recon is done","developer",["Implement PBI-«ID» per its acceptance criteria. Reuse existing helpers (grep first), keep the","diff minimal, run the changed tests + lint, and exercise the changed path before handing off."]],

/* ════ helpers ════ */
const app=document.getElementById("app");
const esc=s=>s;
const mark=l=>l.replace(/«([^»]+)»/g,'<span class="v">«$1»</span>');
const byId=Object.fromEntries(P.map(p=>[p.id,p]));
const reduced=matchMedia("(prefers-reduced-motion: reduce)").matches;

function weaveSVG(h,anim){
  const W=1200,cols=["#3B7DC4","#3A9E6A","#6B50B0","#B08030","#3A6BA0","#984040","#307A6A","#906040","#7A5030","#4040A0"];
  let warp="";
  for(let i=0;i<46;i++){const x=(i+.5)*(W/46);warp+='<line x1="'+x+'" y1="0" x2="'+x+'" y2="'+h+'" stroke="'+cols[i%10]+'" stroke-opacity="0.13"/>';}
  const pts=[];for(let i=0;i<=46;i++){const x=i*(W/46);const y=h*0.5+Math.sin(i*0.5)*h*0.26+Math.cos(i*0.17)*14;pts.push([x,y]);}
  let d="M"+pts[0][0]+","+pts[0][1];
  for(let i=1;i<pts.length;i++){const a=pts[i-1],b=pts[i];d+=" Q"+a[0]+","+a[1]+" "+((a[0]+b[0])/2)+","+((a[1]+b[1])/2);}
  const dash=(anim&&!reduced)?' pathLength="1" stroke-dasharray="1" stroke-dashoffset="1"':"";
  const an=(anim&&!reduced)?'<animate attributeName="stroke-dashoffset" from="1" to="0" dur="2.4s" begin="0.15s" fill="freeze" calcMode="spline" keySplines="0.4 0 0.2 1"/>':"";
  return '<svg viewBox="0 0 '+W+' '+h+'" preserveAspectRatio="xMidYMid slice" aria-hidden="true"><g>'+warp+'</g>'+
    '<path d="'+d+'" fill="none" stroke-linecap="round" style="stroke:var(--gold);stroke-width:2.2;filter:drop-shadow(0 0 5px color-mix(in srgb,var(--gold) 55%,transparent))"'+dash+'>'+an+'</path></svg>';
}

   '<div class="hubwrap"><div class="cards">'+cards+'</div></div>';
  // search
  const q=document.getElementById("q"),res=document.getElementById("res");
  const IDX=[];
  P.forEach(p=>{
    IDX.push({k:"persona",label:p.name+" "+p.alt,sub:p.name,target:"#/"+p.id});
    p.agents.forEach(a=>IDX.push({k:"agent",label:a[0],sub:p.name,target:"#/"+p.id+"@agents"}));
    p.agents.forEach(a=>{if(a[1]&&a[1]!=="—")IDX.push({k:"command",label:a[1],sub:p.name,target:"#/"+p.id+"@agents"})});
    p.prompts.forEach(pr=>IDX.push({k:"prompt",label:pr[0],sub:p.name,target:"#/"+p.id+"@prompts"}));
  });
  q.addEventListener("input",()=>{
    const v=q.value.trim().toLowerCase();
    if(v.length<2){res.classList.remove("show");res.innerHTML="";return;}
    const hits=IDX.filter(i=>i.label.toLowerCase().includes(v)).slice(0,9);
    res.innerHTML=hits.map(h=>'<a href="'+h.target+'"><span>'+h.label+'</span><span class="kind">'+h.k+' · <b>'+h.sub+'</b></span></a>').join("")||
      '<a><span style="color:var(--ink-dim)">no matches</span></a>';
    res.classList.add("show");
  });
  q.addEventListener("keydown",e=>{if(e.key==="Escape"){res.classList.remove("show");q.blur();}});
  startLoop();
}

/* ════ Woven Loop (hub hero) — the agent walking all six stages ════ */
let __loopRaf=null;
function startLoop(){
  if(__loopRaf){cancelAnimationFrame(__loopRaf);__loopRaf=null;}
  const cv=document.querySelector(".loopcanvas");if(!cv||!cv.getContext)return;
  const reduce=matchMedia("(prefers-reduced-motion:reduce)").matches;
  const dpr=Math.min(window.devicePixelRatio||1,2.5),S=520;
  cv.width=S*dpr;cv.height=S*dpr;
  const c=cv.getContext("2d");c.setTransform(dpr,0,0,dpr,0,0);c.lineJoin="round";
  const pal=()=>{const g=getComputedStyle(document.documentElement),v=n=>g.getPropertyValue(n).trim();
    return {amber:v("--gold"),amberLt:v("--gold-hi"),blue:v("--weft-dim"),blueLt:v("--weft"),
      ink:v("--ground"),on:v("--ink"),off:v("--ink-dim")};};
  const STAGES=[{d:60,label:"LEARN",side:"run"},{d:120,label:"PLAN",side:"make"},{d:180,label:"BUILD",side:"make"},
    {d:240,label:"TEST",side:"make"},{d:300,label:"SHIP",side:"run"},{d:360,label:"OPERATE",side:"run"}]
    .map(s=>({t:s.d*Math.PI/180,label:s.label,side:s.side}));
  const af=0.22,ys=1.34,cx=S/2,cy=S/2,w=S*0.048,n=600,q=n/4;
  const PTS=[];for(let i=0;i<=n;i++){const tt=i/n*2*Math.PI,s=Math.sin(tt),cc=Math.cos(tt),d=1+s*s;
    PTS.push([cx+S*af*cc/d,cy+(S*af*s*cc/d)*ys]);}
  const pt=tt=>{const s=Math.sin(tt),cc=Math.cos(tt),d=1+s*s;return [cx+S*af*cc/d,cy+(S*af*s*cc/d)*ys];};
  const seg=(i0,i1,col,ww)=>{c.lineCap="round";c.beginPath();
    for(let i=i0;i<=i1;i++){const pp=PTS[i];i===i0?c.moveTo(pp[0],pp[1]):c.lineTo(pp[0],pp[1]);}
    c.strokeStyle=col;c.lineWidth=ww;c.stroke();};
  const active=headT=>{let best=0,bd=1e9;
    for(let i=0;i<STAGES.length;i++){const d=((headT-STAGES[i].t)%(2*Math.PI)+2*Math.PI)%(2*Math.PI);
      if(d<bd){bd=d;best=i;}}return best;};
  function draw(headT){
    const P=pal(),ai=active(headT);
    c.clearRect(0,0,S,S);
    c.globalAlpha=.16;seg(0,n,P.off,w);c.globalAlpha=1;
    c.globalAlpha=.5;seg(0,q,P.amber,w);seg(3*q,n,P.amber,w);seg(q,3*q,P.blue,w);c.globalAlpha=1;
    const hi=Math.round(headT/(2*Math.PI)*n),L=72;
    for(let k=L;k>=0;k--){const idx=((hi-k)%n+n)%n,p0=PTS[idx],p1=PTS[(idx+1)%n];
      c.globalAlpha=(1-k/L)*(1-k/L);const col=(idx<=q||idx>=3*q)?P.amberLt:P.blueLt;
      c.lineCap="round";c.beginPath();c.moveTo(p0[0],p0[1]);c.lineTo(p1[0],p1[1]);
      c.strokeStyle=col;c.lineWidth=w*1.15;c.stroke();}
    c.globalAlpha=1;
    const hp=PTS[hi%n],rg=c.createRadialGradient(hp[0],hp[1],0,hp[0],hp[1],w*3);
    rg.addColorStop(0,"rgba(255,247,228,.95)");rg.addColorStop(1,"rgba(255,247,228,0)");
    c.fillStyle=rg;c.beginPath();c.arc(hp[0],hp[1],w*3,0,7);c.fill();
    STAGES.forEach((st,i)=>{const pp=pt(st.t),isA=i===ai,col=st.side==="run"?P.amberLt:P.blueLt,rr=isA?w*1.5:w*0.9;
      if(isA){const gg=c.createRadialGradient(pp[0],pp[1],0,pp[0],pp[1],w*3.4);
        gg.addColorStop(0,st.side==="run"?"rgba(231,190,88,.55)":"rgba(127,176,230,.5)");
        gg.addColorStop(1,"rgba(0,0,0,0)");
        c.fillStyle=gg;c.beginPath();c.arc(pp[0],pp[1],w*3.4,0,7);c.fill();}
      c.beginPath();c.arc(pp[0],pp[1],rr+w*0.5,0,7);c.fillStyle=P.ink;c.fill();
      c.beginPath();c.arc(pp[0],pp[1],rr,0,7);c.fillStyle=col;c.fill();
      const dx=pp[0]-cx,dy=pp[1]-cy,m=Math.sqrt(dx*dx+dy*dy)||1,off=w*2.4;
      c.textBaseline="middle";c.textAlign=dx<-S*0.04?"right":dx>S*0.04?"left":"center";
      c.fillStyle=isA?P.on:P.off;c.font=(isA?"700 ":"500 ")+(S*0.03)+"px ui-monospace,Menlo,Consolas,monospace";
      c.fillText(st.label,pp[0]+dx/m*off,pp[1]+dy/m*off);});
    c.beginPath();c.arc(cx,cy,w*1.7,0,7);c.fillStyle=P.ink;c.fill();
    c.beginPath();c.arc(cx,cy,w,0,7);c.fillStyle=P.amber;c.fill();
    c.beginPath();c.arc(cx,cy,w*0.42,0,7);c.fillStyle=P.ink;c.fill();
    const nowEl=document.getElementById("loopnow");
    if(nowEl&&nowEl.textContent!==STAGES[ai].label)nowEl.textContent=STAGES[ai].label;
  }
  let head=0;
  const frame=()=>{if(!cv.isConnected){__loopRaf=null;return;}
    draw(head/n*2*Math.PI);head=(head+1.0)%n;__loopRaf=requestAnimationFrame(frame);};
  if(reduce)draw(1.6);else frame();
}

/* ════ persona view ════ */
function section(n,title,note,inner){
  return '<section id="'+title.toLowerCase().replace(/[^a-z]+/g,"-")+'" class="reveal"><div class="sh"><span class="n">'+n+'</span><h2>'+title+'</h2>'+(note?'<span class="note">'+note+'</span>':"")+'</div>'+inner+'</section>';
}
function renderPersona(p){
  const i=P.indexOf(p),prev=P[(i+P.length-1)%P.length],next=P[(i+1)%P.length];
  if(DEEP[p.id]) p=Object.assign({},p,DEEP[p.id]);
  document.title=p.name+" — Spindleloom Persona";
  let secs=[],n=0;const num=()=>String(n++).padStart(2,"0");

  if(p.io) secs.push(section(num(),"Inputs → outputs","your job in two columns",
    '<div class="io"><div class="b"><h3>You consume</h3><ul>'+p.io.inp.map(x=>"<li>"+x+"</li>").join("")+'</ul></div>'+
    '<div class="b o"><h3>You must ship</h3><ul>'+p.io.out.map(x=>"<li>"+x+"</li>").join("")+'</ul></div></div>'));

  secs.push(section(num(),"Your agents","the specialists you invoke",
    '<table class="tbl"><thead><tr><th>Agent</th><th>Invoke</th><th>What it does for you</th></tr></thead><tbody>'+
    p.agents.map(a=>'<tr><td class="a">'+a[0]+'</td><td class="cmd">'+a[1]+'</td><td>'+a[2]+'</td></tr>').join("")+
    '</tbody></table>'+(p.shared?'<p style="font-size:13px;margin-top:10px">'+p.shared+'</p>':"")));

  if(p.flow) secs.push(section(num(),"Driving a feature","the sequence, end to end",
    '<ol class="flow">'+p.flow.map(x=>"<li>"+x+"</li>").join("")+'</ol>'));

  if(p.decide) secs.push(section(num(),"Decision guide","which move, when",
    '<div class="calls">'+p.decide.map(d=>'<div class="call"><div class="tag">'+d[0]+'</div><div><div class="q">'+d[1]+'</div><div class="aa">'+d[2]+'</div></div></div>').join("")+'</div>'));

  secs.push(section(num(),"Best prompts","copy-ready · swap the «placeholders»",
    p.prompts.map(pr=>'<div class="prompt"><div class="ph"><div><div class="nm">'+pr[0]+'</div><div class="wn">'+pr[1]+'</div></div><span class="tg">'+pr[2]+'</span></div>'+
      '<div class="bd"><button class="copy" aria-label="Copy prompt">Copy</button><pre>'+pr[3].map(mark).join("\n")+'</pre></div></div>').join("")));

  if(p.kpis) secs.push(section(num(),"How you're measured","outcomes, not activity",
    '<div class="kpi">'+p.kpis.map(k=>'<div class="k"><b>'+k[0]+'</b><span>'+k[1]+'</span></div>').join("")+'</div>'));

  secs.push(section(num(),"Hand-off","what the next persona needs before you pass",
    '<div class="loom">'+p.handoff.map(h=>{const t=byId[h[0]];
      return '<div class="row"><div class="to"><a href="#/'+t.id+'">'+t.name+'</a></div><div class="need">'+h[1]+'</div></div>';}).join("")+'</div>'+
    '<div class="grid2" style="margin-top:22px"><div class="blk"><h3>Gates you own</h3><ul>'+p.gates.map(g=>"<li>"+g+"</li>").join("")+'</ul></div>'+
    '<div class="blk"><h3>Pitfalls you avoid</h3><ul>'+p.pitfalls.map(g=>"<li>"+g+"</li>").join("")+'</ul></div></div>'+
    '<h3 style="font-family:var(--mono);font-size:10.5px;letter-spacing:.12em;text-transform:uppercase;color:var(--gold);margin:24px 0 10px">Skills behind your agents</h3>'+
    '<div class="chips">'+p.skills.map(s=>'<span class="chip">'+s+'</span>').join("")+'</div>'));

  if(p.trouble) secs.push(section(num(),"Troubleshooting","the gotchas the validators catch",
    '<div class="calls">'+p.trouble.map(d=>'<div class="call warn"><div class="tag">'+d[0]+'</div><div><div class="q">'+d[1]+'</div><div class="aa">'+d[2]+'</div></div></div>').join("")+'</div>'));

  if(p.glossary) secs.push(section(num(),"Glossary","your working vocabulary",
    '<div class="glo">'+p.glossary.map(g=>'<div><b>'+g[0]+'</b> — '+g[1]+'</div>').join("")+'</div>'));

  const spine='<nav class="spine" aria-label="Contents"><ol>'+
    secs.map(s=>{const id=s.match(/id="([^"]+)"/)[1];const t=s.match(/<h2>([^<]+)<\/h2>/)[1];
      return '<li><a href="#'+id+'" data-l>'+t+'</a></li>';}).join("")+'</ol></nav>';

  const qs=p.qs?'<div class="layout" style="display:block;max-width:1080px"><div class="qhead">▸ Quick start — your first three moves</div><div class="qs">'+
    p.qs.map(s=>'<div class="step"><div class="k">'+s[0]+'</div><div class="c">'+s[1]+'</div><div class="d">'+s[2]+'</div></div>').join("")+'</div></div>':"";

  app.innerHTML=
   '<div class="crumb"><a href="#/">Personas</a> / '+p.no+' '+p.name+'</div>'+
   '<div class="phero">'+weaveSVG(360,true)+'<div class="veil"></div><div class="in">'+
   '<div class="kicker">Field Handbook · Persona <span style="color:var(--gold)">'+p.no+'</span> of '+P.length+'</div>'+
   '<h1>The <em>'+p.name+'</em></h1><div class="role">'+p.alt+'</div>'+
   '<p class="thesis">'+p.mission+'</p>'+
   '<div class="facts"><div class="fact"><div class="n">'+p.agents.length+'</div><div class="l">Agents you drive</div></div>'+
   '<div class="fact"><div class="n">'+p.span.length+'</div><div class="l">Phases you span</div></div>'+
   '<div class="fact"><div class="n">'+p.prompts.length+'</div><div class="l">Prompts in your kit</div></div>'+
   (p.accepts?'<div class="fact"><div class="n">'+p.accepts+'</div><div class="l">Boundaries you accept</div></div>':"")+
   '</div></div></div>'+qs+
   '<div class="layout">'+spine+'<div class="content">'+secs.join("")+
   '<div class="pager"><a href="#/'+prev.id+'"><div class="dir">← previous</div><div class="nm">'+prev.name+'</div></a>'+
   '<a class="next" href="#/'+next.id+'"><div class="dir">next →</div><div class="nm">'+next.name+'</div></a></div>'+
   '</div></div>';

  // copy buttons
  app.querySelectorAll(".prompt").forEach(card=>{
    const b=card.querySelector(".copy"),pre=card.querySelector("pre");
    b.addEventListener("click",async()=>{
      const txt=pre.textContent;
      try{await navigator.clipboard.writeText(txt);}catch(e){
        const r=document.createRange();r.selectNodeContents(pre);
        const s=getSelection();s.removeAllRanges();s.addRange(r);try{document.execCommand("copy");}catch(_){}}
      b.textContent="Copied";b.classList.add("done");
      setTimeout(()=>{b.textContent="Copy";b.classList.remove("done");},1400);
    });
  });
  // reveal + scroll-spy
  const io=new IntersectionObserver(es=>es.forEach(e=>{if(e.isIntersecting)e.target.classList.add("in");}),{threshold:.07});
  app.querySelectorAll(".reveal").forEach(s=>io.observe(s));
  const items=[...app.querySelectorAll(".spine li")];
  const map={};items.forEach(li=>{map[li.querySelector("a").getAttribute("href").slice(1)]=li;});
  const spy=new IntersectionObserver(es=>es.forEach(e=>{if(e.isIntersecting){
    items.forEach(l=>l.classList.remove("on"));const li=map[e.target.id];if(li)li.classList.add("on");}}),
    {rootMargin:"-38% 0px -55% 0px"});
  app.querySelectorAll("section[id]").forEach(s=>spy.observe(s));
}

/* ════ router ════ */
function route(){
  const h=location.hash.replace(/^#\/?/,"");
  const anchor=h.includes("@")?h.split("@")[1]:null;
  const id=h.split("@")[0];
  const p=byId[id];
  window.scrollTo(0,0);
  if(p){renderPersona(p);document.getElementById("jump").value=p.id;}
  else{renderHub();document.getElementById("jump").value="";}
  app.focus({preventScroll:true});
  if(anchor){const el=document.getElementById(anchor==="agents"?"your-agents":"best-prompts");if(el)el.scrollIntoView();}
}
window.addEventListener("hashchange",route);

/* jump select */
const jump=document.getElementById("jump");
jump.innerHTML='<option value="">— overview —</option>'+P.map(p=>'<option value="'+p.id+'">'+p.no+' · '+p.name+'</option>').join("");
jump.addEventListener("change",()=>{location.hash=jump.value?"#/"+jump.value:"#/";});

/* theme */
const root=document.documentElement;
document.getElementById("themeToggle").addEventListener("click",()=>{
  const dark=matchMedia("(prefers-color-scheme:dark)").matches;
  const cur=root.getAttribute("data-theme")||(dark?"dark":"light");
  root.setAttribute("data-theme",cur==="dark"?"light":"dark");
});

/* close search results on outside click (global — survives re-renders) */
document.addEventListener("click",e=>{
  if(!e.target.closest(".searchbox")){
    const r=document.getElementById("res");
    if(r)r.classList.remove("show");
  }
});

/* keyboard: / focuses search on hub */
document.addEventListener("keydown",e=>{
  if(e.key==="/"&&!e.target.closest("input,select,textarea")){
    const q=document.getElementById("q");
    if(q){e.preventDefault();q.focus();}
  }
});

route();
