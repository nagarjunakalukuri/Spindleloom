name: Spindleloom CI

on:
  push:
    branches: ["**"]
  pull_request:
    branches: ["**"]

jobs:
  # ── Fleet integrity ──────────────────────────────────────────────────────────
  validate-fleet:
    name: Fleet integrity (validate_graph + harness bundles)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Refresh INDEX + validate graph
        run: |
          python hooks/build_agent_index.py
          python hooks/validate_graph.py

      - name: Harness bundles not stale
        run: python hooks/build_harness_artifacts.py --check
      - name: Handoff lines not stale
        run: python hooks/build_handoffs.py --check
      - name: HELP not stale
        run: python hooks/build_help.py --check
      - name: Harness conformance (per-tool format rules)
        run: python hooks/validate_targets.py

  # ── Spec traceability ────────────────────────────────────────────────────────
  validate-traceability:
    name: Spec traceability (validate_reqs)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0   # need history + origin/<base> for the diff below

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Validate changed spec folders
        run: |
          changed=$(git diff --name-only origin/${{ github.base_ref || 'main' }}... \
            | grep -E '/RTM\.md$' | xargs -n1 dirname | sort -u || true)
          if [[ -z "$changed" ]]; then
            echo "No RTM.md files changed — skipping spec traceability check."
            exit 0
          fi
          for d in $changed; do
            echo "Validating $d …"
            python hooks/validate_reqs.py "$d"
          done

  # ── Hook lint ────────────────────────────────────────────────────────────────
  lint-hooks:
    name: Lint shell hooks (shellcheck)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install shellcheck
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y shellcheck

      - name: shellcheck --severity=warning hooks/*.sh
        run: |
          shfiles=$(find hooks/ -maxdepth 1 -name '*.sh' 2>/dev/null || true)
          if [[ -z "$shfiles" ]]; then
            echo "No .sh files found in hooks/ — nothing to lint."
            exit 0
          fi
          echo "Linting: $shfiles"
          shellcheck --severity=warning $shfiles

  # ── Python unit tests ────────────────────────────────────────────────────────
  test-hooks:
    name: Python hook tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install pytest
        run: python -m pip install --upgrade pip pytest

      - name: Run hook tests
        # The tests are pytest-style bare `def test_*` functions. `unittest
        # discover` only collects the ~13 TestCase-based ones (of ~73) and exits
        # OK — so pytest is required and must NOT fall back or swallow errors.
        run: python -m pytest hooks/ -q

  # ── MCP server smoke test ─────────────────────────────────────────────────────
  # mcp_server.py is the one component with a required dependency (mcp[cli]), so it
  # lives in its own job rather than the stdlib-only test-hooks job above. The smoke
  # test spawns the server over stdio and asserts the tool/resource surface plus the
  # read-only-by-default write gate. Launches with sys.executable (no uv needed).
  test-mcp:
    name: MCP server smoke test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install MCP SDK
        run: python -m pip install --upgrade pip "mcp[cli]>=1.2"

      - name: Smoke-test the MCP server (stdio, read-only)
        run: python hooks/test_mcp_server.py

  # ── Plugin install smoke test ─────────────────────────────────────────────────
  plugin-install:
    name: Plugin install smoke test
    runs-on: ubuntu-latest
    needs: [validate-fleet, lint-hooks]
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Build targets/ bundles
        run: python hooks/build_harness_artifacts.py

      - name: Verify claude-plugin bundle structure
        run: |
          test -d targets/claude-plugin || { echo "claude-plugin bundle missing"; exit 1; }
          test -f targets/claude-plugin/.claude-plugin/plugin.json || \
            { echo "plugin.json missing in claude-plugin bundle"; exit 1; }
          echo "Plugin bundle structure OK."

      - name: Verify agent count in plugin bundle
        run: |
          python - <<'EOF'
          import sys, pathlib
          agents_dir = pathlib.Path("targets/claude-plugin/agents")
          if not agents_dir.exists():
              sys.exit(0)   # not generated yet; skip
          agents = list(agents_dir.glob("*.md"))
          print(f"Plugin bundle: {len(agents)} agents")
          if len(agents) < 40:
              print("ERROR: fewer than 40 agents in bundle — bundle looks truncated")
              sys.exit(1)
          EOF
