repos:
  - repo: local
    hooks:
      # ── Fleet integrity ──────────────────────────────────────────────────────
      - id: refresh-agent-index
        name: Refresh agents/INDEX.md
        entry: python hooks/build_agent_index.py
        language: python
        pass_filenames: false
        files: ^agents/.*\.md$
        stages: [pre-commit]

      - id: validate-agent-fleet
        name: Validate agent fleet (graph symmetry, skills, INDEX, claude_code)
        entry: python hooks/validate_graph.py
        language: python
        pass_filenames: false
        files: ^(agents|skills|commands)/.*\.md$
        stages: [pre-commit]

      - id: validate-example-traceability
        name: Example spec traceability (validate_reqs)
        entry: bash -c 'python hooks/validate_reqs.py examples/healthy-meal-app && python hooks/validate_reqs.py examples/medremind-fleet-eval'
        language: python
        pass_filenames: false
        files: ^examples/
        stages: [pre-commit]

      - id: handoff-lines-fresh
        name: Handoff lines not stale (agents/*.md)
        entry: python hooks/build_handoffs.py --check
        language: python
        pass_filenames: false
        files: ^agents/.*\.md$
        stages: [pre-commit]

      - id: help-fresh
        name: agents/HELP.md not stale
        entry: python hooks/build_help.py --check
        language: python
        pass_filenames: false
        files: ^agents/.*\.md$
        stages: [pre-commit]

      - id: harness-bundles-fresh
        name: Harness bundles not stale (targets/)
        entry: python hooks/build_harness_artifacts.py --check
        language: python
        pass_filenames: false
        files: ^(agents|skills|commands|hooks|templates|knowledge_hub|spindleloom_website)/
        stages: [pre-commit]

      - id: harness-targets-conform
        name: Harness bundles conform to per-tool format rules (validate_targets)
        entry: python hooks/validate_targets.py
        language: python
        pass_filenames: false
        files: ^(agents|skills|commands|hooks|templates|knowledge_hub|spindleloom_website|targets)/
        stages: [pre-commit]

      - id: governance-handbook-fresh
        name: governance-handbook.html not stale (vs GOVERNANCE.md)
        entry: python hooks/build_governance_handbook.py --check
        language: python
        pass_filenames: false
        files: ^(knowledge_hub/GOVERNANCE\.md|spindleloom_website/governance-handbook\.html)$
        stages: [pre-commit]

      - id: doc-counts-fresh
        name: Doc fleet-counts not stale (validate_counts)
        entry: python hooks/validate_counts.py --check
        language: python
        pass_filenames: false
        files: ^(agents|skills|commands|templates)/|\.md$|spindleloom_website/.*\.html$
        stages: [pre-commit]

      - id: personas-in-sync
        name: Persona hub agents/commands match the contracts (validate_personas)
        entry: python hooks/validate_personas.py --check
        language: python
        pass_filenames: false
        files: ^(agents/.*\.md|commands/.*\.md|spindleloom_website/personas/index\.html)$
        stages: [pre-commit]

      - id: fleet-page-fresh
        name: Fleet map data derived from the contracts (build_fleet_page)
        entry: python hooks/build_fleet_page.py --check
        language: python
        pass_filenames: false
        files: ^(agents/.*\.md|spindleloom_website/spindleloom-agent-fleet\.html)$
        stages: [pre-commit]

      - id: guides-site-fresh
        name: Guides site (twins + index) not stale (build_guides_site)
        entry: python hooks/build_guides_site.py --check
        language: python
        pass_filenames: false
        files: ^(knowledge_hub/.*\.md|spindleloom_website/.*\.html)$
        stages: [pre-commit]

      # ── Shell hook lint ──────────────────────────────────────────────────────
      - id: shellcheck-hooks
        name: shellcheck --severity=warning on hooks/*.sh
        entry: shellcheck --severity=warning
        language: system
        files: ^hooks/.*\.sh$
        stages: [pre-commit]

      # ── Python hook tests ────────────────────────────────────────────────────
      - id: python-hook-tests
        name: Python hook unit tests (test_*.py)
        entry: python -m pytest hooks/ -q --tb=short
        language: python
        pass_filenames: false
        files: ^hooks/(.*\.py)$
        stages: [pre-commit]
        additional_dependencies: [pytest]
